<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>快速添加便签 - 笔记收藏与提示词管理器</title>
  <link rel="stylesheet" href="quick-note.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>📝 快速添加笔记</h1>
      <p class="subtitle">快速记录你的想法、灵感或任何内容</p>
    </header>

    <div class="form-container">
      <!-- 标题 -->
      <div class="form-group">
        <label for="note-title">标题</label>
        <input type="text" id="note-title" placeholder="可选">
      </div>

      <!-- 内容 -->
      <div class="form-group">
        <label for="note-content">内容 <span class="required">*</span></label>
        <textarea id="note-content" rows="12" placeholder="在这里输入你的笔记内容..."></textarea>
        <div class="char-count">
          <span id="char-count">0</span> 字符
        </div>
      </div>

      <!-- 标签 -->
      <div class="form-group">
        <label for="note-tags">标签</label>
        <div class="tags-input-container">
          <input type="text" id="note-tags" placeholder="输入标签，按回车添加">
          <div class="tags-list" id="tags-list"></div>
        </div>
        <div class="suggested-tags" id="suggested-tags">
          <span class="suggested-label">推荐标签：</span>
        </div>
      </div>

      <!-- 来源/备注 -->
      <div class="form-group">
        <label for="note-source">来源（可选）</label>
        <input type="text" id="note-source" placeholder="例如：书籍名称、会议记录、灵感来源等">
      </div>

      <!-- 按钮组 -->
      <div class="button-group">
        <button id="save-btn" class="btn btn-primary">💾 保存笔记</button>
        <button id="cancel-btn" class="btn btn-secondary">❌ 取消</button>
      </div>
    </div>
  </div>

   <script src="dataManager.js"></script>
   <script src="quick-note.js"></script>
</body>
</html>
