<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- 主渐变 -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    
    <!-- 金色渐变 -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff8c00;stop-opacity:1" />
    </linearGradient>
    
    <!-- 立体阴影 -->
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="3" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge> 
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/> 
      </feMerge>
    </filter>
    
    <!-- 内发光 -->
    <filter id="innerGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feComposite in="blur" in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="shadowDiff"/>
      <feFlood flood-color="white" flood-opacity="0.3"/>
      <feComposite in2="shadowDiff" operator="in"/>
      <feComposite in2="SourceGraphic" operator="over"/>
    </filter>
  </defs>
  
  <!-- 背景圆形带立体效果 -->
  <circle cx="64" cy="64" r="58" fill="url(#mainGrad)" filter="url(#dropShadow)"/>
  <circle cx="64" cy="64" r="54" fill="url(#mainGrad)" filter="url(#innerGlow)"/>
  
  <!-- 3D书本/笔记本 -->
  <g transform="translate(28, 30)">
    <!-- 书本阴影 -->
    <path d="M8 8 L64 8 L64 76 L8 76 Z" fill="rgba(0,0,0,0.2)" transform="translate(4, 4)"/>
    
    <!-- 书本封面 -->
    <rect x="4" y="4" width="56" height="68" rx="6" fill="#5a67d8"/>
    
    <!-- 书页 -->
    <rect x="8" y="8" width="48" height="60" rx="3" fill="white"/>
    
    <!-- 书页边缘效果 -->
    <rect x="52" y="8" width="4" height="60" fill="#e2e8f0"/>
    
    <!-- 书签带 -->
    <path d="M44 4 L44 28 L48 24 L52 28 L52 4" fill="#e53e3e"/>
    
    <!-- 内容线条 -->
    <rect x="14" y="18" width="30" height="3" rx="1.5" fill="#667eea"/>
    <rect x="14" y="28" width="26" height="3" rx="1.5" fill="#764ba2" opacity="0.7"/>
    <rect x="14" y="38" width="32" height="3" rx="1.5" fill="#667eea" opacity="0.5"/>
    <rect x="14" y="48" width="24" height="3" rx="1.5" fill="#764ba2" opacity="0.6"/>
  </g>
  
  <!-- 3D灯泡/提示词图标 -->
  <g transform="translate(74, 68)">
    <!-- 灯泡光晕 -->
    <circle cx="20" cy="20" r="28" fill="url(#goldGrad)" opacity="0.3"/>
    <circle cx="20" cy="20" r="22" fill="url(#goldGrad)" opacity="0.5"/>
    
    <!-- 灯泡主体 -->
    <ellipse cx="20" cy="16" rx="16" ry="18" fill="url(#goldGrad)" filter="url(#dropShadow)"/>
    
    <!-- 灯泡底座 -->
    <rect x="12" y="32" width="16" height="10" rx="2" fill="#4a5568"/>
    <rect x="14" y="42" width="12" height="4" rx="1" fill="#2d3748"/>
    
    <!-- 灯泡高光 -->
    <ellipse cx="14" cy="10" rx="5" ry="7" fill="white" opacity="0.7"/>
    
    <!-- 灯泡内部发光 -->
    <circle cx="20" cy="18" r="6" fill="#fff3cd" opacity="0.9"/>
  </g>
  
  <!-- 装饰性光点 -->
  <circle cx="24" cy="24" r="4" fill="white" opacity="0.4"/>
  <circle cx="104" cy="32" r="3" fill="white" opacity="0.3"/>
  <circle cx="100" cy="100" r="5" fill="white" opacity="0.2"/>
</svg>